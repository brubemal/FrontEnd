<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Quem está assistindo?</h1>
    </header>

    <main>
        <section aria-label="Seleção de perfil">
            <ul class="profiles">
                <li>
                    <article class="profile">
                        <figure>
                            <img src="assets/profile1.png" alt="Avatar do Perfil 1" width="120" height="120">
                            <figcaption>Bruno</figcaption>
                        </figure>
                    </article>
                </li>
                <li>
                    <article class="profile">
                        <figure>
                            <img src="assets/profile2.png" alt="Avatar do Perfil 2" width="120" height="120">
                            <figcaption>Carlos</figcaption>
                        </figure>
                    </article>
                </li>
                <li>
                    <article class="profile">
                        <figure>
                            <img src="assets/profile3.png" alt="Avatar do Perfil 3" width="120" height="120">
                            <figcaption>Maria</figcaption>
                        </figure>
                    </article>
                </li>
                <li>
                    <article class="profile">
                        <figure>
                            <img src="assets/profile4.png" alt="Avatar do Perfil 4" width="120" height="120">
                            <figcaption>João</figcaption>
                        </figure>
                    </article>
                </li>
            </ul>
        </section>
    </main>
</body>
</html>
