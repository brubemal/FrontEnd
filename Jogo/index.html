<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo de Aventura 2D</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hud">
    <div class="hud-item">Vida: <span id="vida">100</span></div>
    <div class="hud-item">Nível: <span id="nivel">1</span></div>
    <div class="hud-item">Pontos: <span id="pontos">0</span></div>
  </header>

  <main class="game-wrapper">
    <section class="game-screen" id="gameScreen" tabindex="0">
      <div class="player" id="player"></div>
      <div class="tile grid" id="grid"></div>
      <div class="notification" id="notification"></div>
    </section>

    <aside class="sidepanel">
      <h2>Ações</h2>
      <p>Use as setas para mover.</p>
      <p>Espaço para interagir.</p>
    </aside>
  </main>

  <footer class="footer">
    <p>Jogo 2D - Prototipo</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
